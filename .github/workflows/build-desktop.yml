name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gravytos-windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: gravytos-macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: gravytos-linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend first
        run: npx vite build
        working-directory: apps/desktop

      - name: Verify dist exists
        run: test -f dist/index.html && echo "dist OK" || (echo "dist MISSING" && exit 1)
        working-directory: apps/desktop
        shell: bash

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri
        run: cargo tauri build --target ${{ matrix.target }} --verbose
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          RUST_BACKTRACE: "1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gravytos-windows/**/*.msi
            gravytos-macos/**/*.dmg
            gravytos-linux/**/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

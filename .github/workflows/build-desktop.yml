name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gravytos-windows
            bundle_ext: msi
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: gravytos-macos
            bundle_ext: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: gravytos-linux
            bundle_ext: appimage

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Node dependencies
        run: npm install
        working-directory: .

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build desktop app
        run: tauri build --target ${{ matrix.target }}
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.${{ matrix.bundle_ext }}
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" \) | head -20

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gravytos-windows/**/*.msi
            gravytos-macos/**/*.dmg
            gravytos-linux/**/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
